<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060607" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/png" href="/src/assets/jc-logo.png" />
    <title>Jason Conklin | Portfolio</title>
    <script>
      (() => {
        const STORAGE_KEY = "jc-theme";
        const stored = window.localStorage.getItem(STORAGE_KEY);
        const theme =
          stored === "light" || stored === "dark" || stored === "system" ? stored : "dark";
        const resolved =
          theme === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : theme;

        const root = document.documentElement;
        root.classList.remove("light", "dark");
        root.classList.add(resolved);
        root.dataset.theme = resolved;
        root.style.colorScheme = resolved;

        const themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) {
          themeMeta.setAttribute("content", resolved === "dark" ? "#060607" : "#eef3f9");
        }

        window.__jcBootStart = performance.now();
      })();
    </script>
    <style>
      :root {
        --boot-bg: #060607;
        --boot-bg-deep: #040405;
        --boot-text: rgba(255, 255, 255, 0.9);
        --boot-muted: rgba(255, 255, 255, 0.48);
        --boot-line: rgba(255, 184, 79, 0.72);
        --boot-line-soft: rgba(255, 120, 36, 0.22);
        --boot-ribbon-a: rgba(255, 185, 89, 0.26);
        --boot-ribbon-b: rgba(255, 111, 29, 0.16);
        --boot-ribbon-c: rgba(255, 255, 255, 0.06);
      }

      html.light {
        --boot-bg: #eef3f9;
        --boot-bg-deep: #e6edf7;
        --boot-text: rgba(16, 35, 64, 0.9);
        --boot-muted: rgba(41, 67, 102, 0.56);
        --boot-line: rgba(60, 121, 245, 0.78);
        --boot-line-soft: rgba(89, 159, 255, 0.24);
        --boot-ribbon-a: rgba(137, 194, 255, 0.28);
        --boot-ribbon-b: rgba(74, 132, 255, 0.16);
        --boot-ribbon-c: rgba(255, 255, 255, 0.12);
      }

      html,
      body,
      #root {
        min-height: 100%;
        height: auto;
      }

      html,
      body {
        margin: 0;
        background:
          radial-gradient(circle at 74% 18%, var(--boot-ribbon-a) 0%, transparent 22%),
          linear-gradient(180deg, var(--boot-bg-deep) 0%, var(--boot-bg) 100%);
        color: var(--boot-text);
      }

      body {
        overflow-x: hidden;
        font-family:
          "Montserrat",
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      #root {
        position: relative;
        z-index: 0;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        overflow: hidden;
        pointer-events: none;
        background:
          radial-gradient(circle at 74% 18%, var(--boot-ribbon-a) 0%, transparent 24%),
          linear-gradient(180deg, var(--boot-bg-deep) 0%, var(--boot-bg) 100%);
        opacity: 1;
        visibility: visible;
        transition:
          opacity 520ms cubic-bezier(0.16, 1, 0.3, 1),
          visibility 0s linear 520ms;
      }

      html.boot-complete #boot-splash {
        opacity: 0;
        visibility: hidden;
      }

      #boot-splash::before,
      #boot-splash::after {
        content: "";
        position: absolute;
        right: -8vw;
        top: -8vh;
        width: min(40vw, 36rem);
        height: 120vh;
        border-radius: 999px;
        transform: rotate(10deg);
        filter: blur(28px);
        opacity: 0.85;
      }

      #boot-splash::before {
        background:
          linear-gradient(
            180deg,
            transparent 0%,
            var(--boot-ribbon-c) 16%,
            var(--boot-ribbon-a) 42%,
            var(--boot-ribbon-b) 70%,
            transparent 100%
          );
        animation: boot-ribbon-drift 7.2s ease-in-out infinite;
      }

      #boot-splash::after {
        right: 2vw;
        width: min(22vw, 18rem);
        filter: blur(18px);
        opacity: 0.72;
        background:
          linear-gradient(
            180deg,
            transparent 0%,
            rgba(255, 255, 255, 0.02) 20%,
            var(--boot-line-soft) 48%,
            transparent 100%
          );
        animation: boot-ribbon-drift 5.8s ease-in-out infinite reverse;
      }

      .boot-shell {
        position: absolute;
        left: clamp(1.5rem, 5vw, 4rem);
        bottom: clamp(2rem, 10vh, 5rem);
        display: flex;
        flex-direction: column;
        gap: 0.95rem;
        max-width: min(26rem, calc(100vw - 3rem));
      }

      .boot-mark {
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.34em;
        color: var(--boot-muted);
      }

      .boot-wordmark {
        font-size: clamp(1.3rem, 3vw, 2.2rem);
        font-weight: 400;
        letter-spacing: 0.22em;
        color: var(--boot-text);
      }

      .boot-line {
        position: relative;
        width: min(14rem, 38vw);
        height: 1px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }

      html.light .boot-line {
        background: rgba(41, 67, 102, 0.14);
      }

      .boot-line::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent 0%, var(--boot-line) 50%, transparent 100%);
        animation: boot-line-sweep 1.35s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      }

      .boot-caption {
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--boot-muted);
      }

      @keyframes boot-line-sweep {
        0% {
          transform: translateX(-100%);
          opacity: 0;
        }

        18% {
          opacity: 1;
        }

        58% {
          opacity: 1;
        }

        100% {
          transform: translateX(120%);
          opacity: 0;
        }
      }

      @keyframes boot-ribbon-drift {
        0%,
        100% {
          transform: rotate(10deg) translate3d(0, 0, 0) scaleY(1);
        }

        50% {
          transform: rotate(12deg) translate3d(-0.8rem, 1.2rem, 0) scaleY(1.03);
        }
      }
    </style>
  </head>
  <body class="bg-background text-foreground antialiased selection:bg-primary selection:text-primary-foreground">
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-shell">
        <div class="boot-mark">JC</div>
        <div class="boot-wordmark">JASON CONKLIN</div>
        <div class="boot-line"></div>
        <div class="boot-caption">Loading portfolio</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (() => {
        const MIN_BOOT_MS = 520;

        const dismissBootSplash = () => {
          const startedAt = window.__jcBootStart || performance.now();
          const elapsed = performance.now() - startedAt;
          const remaining = Math.max(0, MIN_BOOT_MS - elapsed);

          window.setTimeout(() => {
            document.documentElement.classList.add("boot-complete");

            const splash = document.getElementById("boot-splash");
            if (!splash) return;

            window.setTimeout(() => {
              splash.remove();
            }, 620);
          }, remaining);
        };

        window.addEventListener("jc:app-mounted", dismissBootSplash, { once: true });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
